# KodeAman Configuration — WordPress Demo
# Preset: wordpress
# Language: Bahasa Indonesia

language: id

# Scanner selection
scanners:
  semgrep: true        # SAST — analisis statis untuk injeksi, XSS, akses kontrol
  zapBaseline: false   # DAST — dinonaktifkan (tidak ada server berjalan di demo ini)

# Preset framework
presets:
  - wordpress

# Prioritas temuan
prioritization:
  maxFindingsInComment: 5
  failOnSeverity: high

# Gamifikasi
gamification:
  enabled: true

# Format output
output:
  markdown: true
  sarif: false
  json: false
  html: true

# Pemindaian OWASP Top 10
owasp:
  enabled: true
  categories: [A01, A03, A05, A07]   # Paling relevan untuk WordPress plugin
  parallel: false
  confidenceGate: low
  evidenceGate: true
  failOnSeverity: high
