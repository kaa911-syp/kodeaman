name: Bug Report
description: Report a bug in KodeAman
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thank you for reporting a bug! Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI
        - GitHub Bot
        - GitLab Bot
        - Schema
        - Adapters (Semgrep)
        - Adapters (ZAP)
        - Prioritizer
        - Coaching
        - Gamification
        - Presets
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: KodeAman Version
      placeholder: "0.1.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, Git platform
      placeholder: |
        OS: Ubuntu 22.04
        Node: 20.x
        Platform: GitHub / GitLab self-hosted
