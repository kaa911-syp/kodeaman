services:
  bot-github:
    build:
      context: .
      dockerfile: apps/bot-github/Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  bot-gitlab:
    build:
      context: .
      dockerfile: apps/bot-gitlab/Dockerfile
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kodeaman
      POSTGRES_USER: kodeaman
      POSTGRES_PASSWORD: kodeaman
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
